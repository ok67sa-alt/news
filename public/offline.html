<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل - Sudan News Today</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 20px;
    }
    
    .container {
      max-width: 600px;
    }
    
    h1 {
      font-size: 4rem;
      margin-bottom: 1rem;
      font-weight: 900;
    }
    
    h2 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      font-weight: 700;
    }
    
    p {
      font-size: 1.25rem;
      line-height: 1.8;
      margin-bottom: 2rem;
      opacity: 0.9;
    }
    
    button {
      background: white;
      color: #667eea;
      border: none;
      padding: 1rem 2.5rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }
    
    .icon {
      font-size: 6rem;
      margin-bottom: 2rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>غير متصل</h1>
    <h2>لا يوجد اتصال بالإنترنت</h2>
    <p>
      عذراً، يبدو أنك غير متصل بالإنترنت حالياً.<br>
      يرجى التحقق من اتصالك والمحاولة مرة أخرى.
    </p>
    <button onclick="window.location.reload()">
      إعادة المحاولة
    </button>
  </div>
</body>
</html>
